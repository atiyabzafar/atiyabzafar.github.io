<style>
  /* --- App Container & Tabs --- */
  #books-app {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 2rem 0;
  }

  .books-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    border-bottom: 2px solid #eaeaea;
    padding-bottom: 0px;
  }

  .book-tab {
    background: none;
    border: none;
    padding: 0.6rem 1.2rem;
    font-size: 0.95rem;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px; /* Overlaps the container border */
    transition: all 0.2s ease;
  }

  .book-tab:hover {
    color: #111;
  }

  .book-tab.active {
    color: #3b82f6;
    border-bottom-color: #3b82f6;
  }

  /* --- Grid Layout (From Previous Step) --- */
  .books-grid-layout {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1.2rem;
  }

  .book-card {
    background: #fff;
    border: 1px solid #eaeaea;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.04);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    container-type: inline-size; 
  }

  .book-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px rgba(0, 0, 0, 0.15);
  }

  .book-cover-wrapper {
    position: relative;
    width: 100%;
    height: 180px;
    background: #f4f4f5;
    border-bottom: 1px solid #eaeaea;
    overflow: hidden;
  }

  .book-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    transition: transform 0.3s ease;
  }

  .book-card:hover .book-cover {
    transform: scale(1.05);
  }

  .book-genres-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(2px);
    display: flex;
    align-content: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.4rem;
    padding: 1rem;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .book-card:hover .book-genres-overlay { opacity: 1; }

  .genre-tag {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    font-size: 0.7rem;
    padding: 0.2rem 0.5rem;
    border-radius: 12px;
    text-align: center;
  }

  .book-info {
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }

  .book-title {
    font-size: clamp(0.85rem, 6.5cqi, 1.1rem);
    font-weight: 600;
    color: #111;
    margin: 0 0 0.2rem 0;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-author {
    font-size: clamp(0.75rem, 5.5cqi, 0.9rem);
    color: #666;
    margin: 0 0 0.6rem 0;
  }

  .book-date {
    margin-top: auto;
    border-top: 1px solid #eaeaea;
    padding-top: 0.5rem;
    font-size: clamp(0.65rem, 4.5cqi, 0.8rem);
    color: #888;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  /* --- Table Layout --- */
  .books-table-layout {
    width: 100%;
    overflow-x: auto; /* Allows horizontal scrolling on small phones */
  }

  .books-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
  }

  .books-table th, .books-table td {
    padding: 0.8rem;
    text-align: left;
    border-bottom: 1px solid #eaeaea;
    font-size: 0.9rem;
  }

  .books-table th {
    background: #f8f9fa;
    font-weight: 600;
    color: #333;
  }

  .table-cover-img {
    width: 40px;
    height: 60px;
    object-fit: cover;
    border-radius: 4px;
    background: #f4f4f5;
  }

  .table-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .table-genre-tag {
    background: #f3f4f6;
    color: #374151;
    font-size: 0.7rem;
    padding: 0.1rem 0.4rem;
    border-radius: 8px;
  }

  /* Dark Mode Support */
  @media (prefers-color-scheme: dark) {
    .books-tabs { border-color: #333; }
    .book-tab { color: #aaa; }
    .book-tab:hover { color: #eee; }
    .book-tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    
    .book-card { background: #1e1e1e; border-color: #333; }
    .book-cover-wrapper { background: #2a2a2a; border-color: #333; }
    .book-title { color: #f5f5f5; }
    .book-author { color: #aaa; }
    .book-date { border-color: #333; color: #aaa; }
    
    .books-table th { background: #222; color: #ddd; border-color: #333; }
    .books-table td { border-color: #333; color: #ccc; }
    .table-genre-tag { background: #333; color: #ddd; }
  }
</style>

<div id="books-app">
  <div class="books-tabs" id="books-tabs" style="display: none;">
    <button class="book-tab" data-view="all">All Books</button>
    <button class="book-tab active" data-view="year">Read This Year</button>
    <button class="book-tab" data-view="table">Table View</button>
  </div>
  
  <div id="books-loading" style="text-align: center; padding: 2rem; color: #666;">Loading Library...</div>
  <div id="books-content"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="/assets/books/books-script.js"></script>
